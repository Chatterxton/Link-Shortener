services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS}
      SHORT_CODE_LENGTH: ${SHORT_CODE_LENGTH}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      PUBLIC_SCHEME: ${PUBLIC_SCHEME}
      PUBLIC_PORT_SUFFIX: ${PUBLIC_PORT_SUFFIX}
      CORS_ORIGIN: ${CORS_ORIGIN}
      REDIRECT_RATE_PER_MIN: ${REDIRECT_RATE_PER_MIN}
      LOGIN_RATE_PER_MIN: ${LOGIN_RATE_PER_MIN}
      LISTEN_ADDR: ":8080"
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:3000"
    depends_on:
      - backend

volumes:
  db_data:
