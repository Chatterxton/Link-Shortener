# Example nginx reverse-proxy config for the link shortener.
# Place this on the host machine (outside docker), point upstreams
# at the published BACKEND_PORT / FRONTEND_PORT from .env.

upstream shortener_backend {
    server 127.0.0.1:8080;
}
upstream shortener_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name short.example.com;

    # API
    location /api/ {
        proxy_pass         http://shortener_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Short-link redirects (prefixed with /r/ to avoid collisions with frontend routes)
    location /r/ {
        proxy_pass         http://shortener_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass         http://shortener_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
